<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="shortcut icon" href="./assets/imgs/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="./assets/imgs/logo.png" alt="Logo">
            <h2>Recipes Explorer</h2>
        </div>
        <nav>
            <ul>
                <li><a href="favorites.html"><i class="fa-regular fa-heart"></i> Favorites</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="options">
            <h1>Discover Your Next Dish</h1>
            <p>Browse different hand-picked recipes from around the globe.</p>
            <div class="search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-bar" placeholder="Search for a recipe by name or ingredient..."
                    autocomplete="off">
            </div>
        </div>

        <div class="controls-bar">
            <div class="filters-group">
                <div class="filter-item">
                    <label for="cuisine">Cuisine:</label>
                    <select id="cuisine">
                        <option value="all" selected>All Cuisines</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="difficulty">Difficulty:</label>
                    <select id="difficulty">
                        <option value="all" selected>All Difficulties</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="mealType">Meal Type:</label>
                    <select id="mealType">
                        <option value="all" selected>All Meal Types</option>
                    </select>
                </div>
            </div>

            <div class="results-meta">
                <p>Showing <span id="found">0</span> of <span id="total">0</span> recipes</p>
            </div>
        </div>

        <div id="recipes"></div>
    </main>

    <footer>
        <p class="copyright">© <span id="date"></span> Recipes Explorer. Developed by <a href="https://ed42.tech"
                target="_blank" rel="noopener noreferrer">ed42</a>. All rights reserved.</p>
    </footer>

    <script src="./assets/js/common.js"></script>
    <script src="./assets/js/index.js"></script>
</body>

</html>
