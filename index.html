<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes Explorer</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            width: 100vw;
            background: #f4f5f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #212529;
            overflow-x: hidden;
        }

        #recipes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
        }

        .card-header {
            position: relative;
            width: 100%;
            height: 200px;
        }

        .card-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-header .cuisine {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(33, 37, 41, 0.65);
            color: #ffffff;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            padding: 4px 10px;
            border-radius: 7px;
        }

        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .card-body > div {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 8px;
        }

        .card h2 {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 4px 0 16px;
            color: #111;
            line-height: 1.3;
        }

        .rating {
            font-weight: 600;
            color: #333;
        }

        .difficulty {
            background: #f1f3f5;
            color: #495057;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .card button {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            background: transparent;
            color: #212529;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card button:hover {
            background: #3e4246;
            color: #ffffff;
            border-color: #212529;
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            font-weight: 600;
            padding: 40px;
        }
    </style>
</head>

<body>
    <header></header>
    <main id="recipes"></main>
    <script>
        async function getRecipes() {
            const container = document.getElementById('recipes');
            try {
                const response = await fetch('https://dummyjson.com/recipes');
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const data = await response.json();
                allRecipes = data.recipes;
                container.innerHTML = '';
                
                allRecipes.forEach(recipe => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class='card-header'>
                            <span class='cuisine'>${recipe.cuisine.toUpperCase()}</span>
                            <img src='${recipe.image}' alt='${recipe.name} image' loading='lazy'/>
                        </div>
                        <div class='card-body'>
                            <div>
                                <span>${recipe.mealType.join(', ')}</span>
                                <span class='rating'>⭐ ${recipe.rating} (${recipe.reviewCount})</span>    
                            </div>
                            <h2>${recipe.name}</h2>
                            <div>
                                <p>🕒 ${recipe.prepTimeMinutes} min</p>
                                <span class='difficulty'>${recipe.difficulty}</span>
                            </div>
                            <button class='btn-details' data-id='${recipe.id}'>See Details</button>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching recipes:', error);
                container.innerHTML = `<div class="status-msg" style="color: #DC2626;">Failed to load recipes. Please try again later.</div>`;
            }
        }
        getRecipes();
    </script>
</body>

</html>
