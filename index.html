<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        async function getRecipes() {
            try {
                const response = await fetch('https://dummyjson.com/recipes');
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const data = await response.json();

                data.recipes.forEach(recipe => {
                    console.log(`- ID: ${recipe.id}\n- NAME: ${recipe.name}\n- IMAGE: ${recipe.image}\n- CUISINE: ${recipe.cuisine} | RATING: ${recipe.rating} | REVIEWS: ${recipe.reviewCount}\n- PREP TIME: ${recipe.prepTimeMinutes} min | COOK TIME: ${recipe.cookTimeMinutes} min\n- MEAL TYPE: ${recipe.mealType.join(', ')}\n- TAGS: ${recipe.tags.join(', ')}\n- INGREDIENTS:\n\t. ${recipe.ingredients.join('\n\t. ')}\n- INSTRUCTIONS:\n${recipe.instructions.map((step, index) => `\t${index + 1}. ${step}`).join('\n')}\n`);
                });
            } catch (error) {
                console.error('Error fetching recipes:', error);
            }
        }
        getRecipes();
    </script>
</body>

</html>
